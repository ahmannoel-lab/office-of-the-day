<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Office of the Day — A Café Guide</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<style>
  :root{
    --paper:#FAF8F3; --card:#FFFFFF; --ink:#2A2520; --muted:#8A8278;
    --line:#E9E4D9; --matcha:#6B7F5E; --matchaDeep:#4F6147; --matchaSoft:#E8EDE3;
    --serif: Georgia, 'Times New Roman', serif;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; height:100%; overflow:hidden; font-family:var(--sans); color:var(--ink); background:var(--matchaSoft); }
  #map{ position:absolute; inset:0; z-index:0; background:var(--matchaSoft); }
  .leaflet-container{ font-family:var(--sans); background:var(--matchaSoft); }

  /* floating chrome */
  .chrome{ position:absolute; top:0; left:0; right:0; padding:16px; z-index:10;
    display:flex; align-items:flex-start; justify-content:space-between; pointer-events:none; }
  .plate{ pointer-events:auto; background:rgba(255,255,255,.92); border:1px solid var(--line);
    border-radius:16px; padding:10px 16px; backdrop-filter:blur(8px); }
  .plate .eyebrow{ font-size:9px; letter-spacing:.3em; text-transform:uppercase; color:var(--matcha); }
  .plate .title{ font-family:var(--serif); font-size:19px; line-height:1.05; }
  .loc{ pointer-events:auto; width:46px; height:46px; border-radius:999px; display:grid; place-items:center;
    background:rgba(255,255,255,.92); color:var(--matchaDeep); border:1px solid var(--line);
    backdrop-filter:blur(8px); cursor:pointer; }
  .loc.on{ background:var(--matcha); color:#fff; border-color:var(--matcha); }
  .loc svg{ width:18px; height:18px; }

  /* bottom sheet */
  .sheet{ position:absolute; left:12px; right:12px; bottom:calc(12px + env(safe-area-inset-bottom));
    z-index:20; height:34vh; overflow:hidden;
    background:var(--paper); border-radius:26px; box-shadow:0 18px 50px rgba(42,37,32,.22);
    display:flex; flex-direction:column; transition:height .42s cubic-bezier(.4,0,.2,1); }
  .sheet.dragging{ transition:none; }
  .grab{ padding:10px 0 8px; flex:none; cursor:grab; touch-action:none; user-select:none; }
  .grab .bar{ width:40px; height:5px; border-radius:999px; background:var(--line); margin:0 auto; }
  .pane{ display:flex; flex-direction:column; min-height:0; flex:1; }
  .pad{ padding:0 20px; flex:none; }
  .row-top{ display:flex; align-items:baseline; justify-content:space-between; }
  .count{ font-size:12px; letter-spacing:.18em; text-transform:uppercase; color:var(--muted); }
  .hint{ font-size:12px; color:var(--matcha); }

  .search{ position:relative; margin-top:12px; }
  .search svg{ position:absolute; left:14px; top:50%; transform:translateY(-50%); width:16px; height:16px; color:var(--muted); }
  .search input{ width:100%; border:1px solid var(--line); background:var(--card); color:var(--ink);
    border-radius:999px; padding:10px 16px 10px 38px; font-size:14px; font-family:var(--sans); outline:none; }

  .chips{ display:flex; gap:8px; overflow-x:auto; padding:12px 0; scrollbar-width:none; }
  .chips::-webkit-scrollbar{ display:none; }
  .chip{ flex:none; white-space:nowrap; border:1px solid var(--line); background:var(--card); color:var(--ink);
    border-radius:999px; padding:6px 14px; font-size:12px; cursor:pointer; }
  .chip.on{ background:var(--ink); color:var(--paper); border-color:var(--ink); }

  .list{ padding:0 12px 32px; overflow-y:auto; flex:1; border-top:1px solid var(--line); }
  .item{ width:100%; text-align:left; background:none; border:none;
    display:flex; align-items:center; gap:12px; padding:12px 8px; cursor:pointer; }
  .mono{ flex:none; width:44px; height:44px; border-radius:12px; display:grid; place-items:center;
    background:var(--matchaSoft); color:var(--matchaDeep); font-family:var(--serif); font-size:15px; }
  .item .meta{ flex:1; min-width:0; }
  .item .name{ font-family:var(--serif); font-size:16px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .item .sub{ font-size:12px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .item .dist{ font-size:11px; color:var(--matcha); flex:none; }
  .chev{ width:16px; height:16px; color:var(--line); flex:none; }

  /* accordion */
  .cafe{ border-bottom:1px solid var(--line); border-radius:16px; transition:background .2s ease; }
  .cafe.open{ background:var(--matchaSoft); }
  .cafe .chev{ transition:transform .25s ease; }
  .cafe.open .chev{ transform:rotate(180deg); color:var(--matcha); }
  .detail{ padding:2px 16px 18px; animation:expand .26s ease; overflow:hidden; }
  @keyframes expand{ from{ opacity:0; transform:translateY(-6px);} to{ opacity:1; transform:translateY(0);} }
  .detail .metaRow{ margin-top:0; }
  .detail .note{ font-size:14px; line-height:1.55; margin:12px 0 0; }
  .detail .addr{ font-size:12px; color:var(--muted); margin:8px 0 12px; }
  .detail .embedWrap{ border:1px solid var(--line); border-radius:16px; overflow:hidden; background:#fff; }
  .detail .cta{ margin-top:12px; }
  .btnRow{ display:flex; gap:10px; margin-top:14px; }
  .btn{ flex:1; display:inline-flex; align-items:center; justify-content:center; gap:7px;
    border-radius:999px; padding:12px; font-size:14px; text-decoration:none; cursor:pointer; border:none; }
  .btn svg{ width:16px; height:16px; }
  .btn-primary{ background:var(--matcha); color:#fff; }
  .btn-dark{ background:var(--ink); color:var(--paper); }

  /* place detail */
  .stars{ display:inline-flex; align-items:center; gap:2px; }
  .stars svg{ width:14px; height:14px; }
  .metaRow{ display:flex; align-items:center; gap:16px; margin-top:12px; }
  .cta{ margin-top:16px; width:100%; display:inline-flex; align-items:center; justify-content:center; gap:8px;
    background:var(--ink); color:var(--paper); border:none; border-radius:999px; padding:12px; font-size:14px;
    text-decoration:none; cursor:pointer; }
  .cta svg{ width:16px; height:16px; }
  .note{ font-size:15px; line-height:1.6; }
  .addr{ font-size:12px; color:var(--muted); margin:12px 0 16px; }
  .embedWrap{ border:1px solid var(--line); border-radius:16px; overflow:hidden; }
  .loadingMap{ position:absolute; inset:0; display:grid; place-items:center; z-index:1; color:var(--matchaDeep); font-size:14px; }
  .muted{ color:var(--muted); }
  .matcha{ color:var(--matcha); }
</style>
</head>
<body>
  <div id="map"></div>
  <div class="loadingMap" id="loadingMap">Loading map…</div>

  <div class="chrome">
    <div class="plate">
      <div class="eyebrow">A Guide</div>
      <div class="title">Office of the Day</div>
    </div>
    <button class="loc" id="locBtn" title="Find cafés near me" aria-label="Find cafés near me">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
    </button>
  </div>

  <section class="sheet" id="sheet">
    <div class="grab" id="grab"><div class="bar"></div></div>
    <div id="pane" class="pane"></div>
  </section>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

/* ===== ICONS (inline svg strings) ===== */
const ICON = {
  pin:'<polyline points="3 11 22 2 13 21 11 13 3 11"/>',
  chev:'<polyline points="9 18 15 12 9 6"/>',
  chevDown:'<polyline points="6 9 12 15 18 9"/>',
  search:'<circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>',
  arrow:'<line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/>',
  nav:'<polygon points="3 11 22 2 13 21 11 13 3 11"/>',
};
const svg = (paths, cls='') =>
  `<svg class="${cls}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${paths}</svg>`;
const stars = (v) => {
  let s='<span class="stars">';
  for(let i=0;i<5;i++){ const f=i<Math.round(v); s+=`<svg viewBox="0 0 24 24" fill="${f?'var(--matcha)':'var(--line)'}" stroke="${f?'var(--matcha)':'var(--line)'}" stroke-width="1.5"><polygon points="12 2 15 9 22 9.3 17 14 18.5 21 12 17.3 5.5 21 7 14 2 9.3 9 9"/></svg>`; }
  s+=`<span class="muted" style="font-size:12px;margin-left:6px">${v.toFixed(1)}</span></span>`; return s;
};
const monogram = (name) => {
  const p = name.replace(/[^a-zA-Z ]/g,'').trim().split(/\s+/);
  return (p.length===1 ? p[0].slice(0,2) : p[0][0]+p[1][0]).toUpperCase();
};
const haversine=(a,b,c,d)=>{const R=3959,r=x=>x*Math.PI/180;const dLat=r(c-a),dLng=r(d-b);
  const h=Math.sin(dLat/2)**2+Math.cos(r(a))*Math.cos(r(c))*Math.sin(dLng/2)**2;return R*2*Math.atan2(Math.sqrt(h),Math.sqrt(1-h));};

/* ===== STATE ===== */
const state = { query:'', hood:'All', selected:null, origin:null, geo:'idle', view:'guide', frac:0.40, dragging:false };
const DETENTS=[0.12,0.40,0.95], PEEK=DETENTS[0], FULL=DETENTS[2];
const hoods = ['All', ...Array.from(new Set(CAFES.map(c=>c.neighborhood.split(',')[0]))).sort()];

function results(){
  let list = CAFES.filter(c=>{
    const q=state.query.toLowerCase();
    const hitQ=!q||c.name.toLowerCase().includes(q)||c.neighborhood.toLowerCase().includes(q)||c.vibe.toLowerCase().includes(q);
    const hitH=state.hood==='All'||c.neighborhood.split(',')[0]===state.hood;
    return hitQ&&hitH;
  });
  if(state.origin){ list=list.map(c=>({...c,dist:haversine(state.origin.lat,state.origin.lng,c.lat,c.lng)})).sort((a,b)=>a.dist-b.dist); }
  return list;
}
const distFor=(c)=>{ const m=results().find(r=>r.id===c.id); return m&&m.dist!=null?m.dist:null; };

/* ===== MAP ===== */
let map, markerLayer, originMarker;
function initMap(){
  map = L.map('map',{ zoomControl:false, attributionControl:true }).setView([40.82,-74.10],10);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
    { subdomains:'abcd', maxZoom:19, attribution:'© OpenStreetMap © CARTO' }).addTo(map);
  map.on('click',()=>{ if(state.selected){ state.selected=null; drawMarkers(); renderPaneListOnly(); } });
  document.getElementById('loadingMap').style.display='none';
  drawMarkers();
}
function pinIcon(sel,dim){
  const fill = sel?'#4F6147':'#6B7F5E', sz=sel?36:28, h=sel?46:36;
  const html =
    `<svg width="${sz}" height="${h}" viewBox="-13 -34 26 34" xmlns="http://www.w3.org/2000/svg" style="opacity:${dim?0.3:1}">
       <ellipse cx="0" cy="-1" rx="6" ry="2.2" fill="rgba(0,0,0,0.18)"/>
       <path d="M0 0 C -5 -10 -9 -13 -9 -19 A 9 9 0 1 1 9 -19 C 9 -13 5 -10 0 0 Z" fill="${fill}" stroke="#fff" stroke-width="2"/>
       <circle cx="0" cy="-19" r="3.4" fill="#fff"/>
     </svg>`;
  return L.divIcon({ className:'', html, iconSize:[sz,h], iconAnchor:[sz/2,h] });
}
function drawMarkers(){
  if(!map) return;
  const vis = new Set(results().map(c=>c.id));
  if(markerLayer){ map.removeLayer(markerLayer); }
  markerLayer = L.layerGroup().addTo(map);
  CAFES.forEach(c=>{
    const sel = state.selected && state.selected.id===c.id;
    const m = L.marker([c.lat,c.lng],{ icon:pinIcon(sel,!vis.has(c.id)), zIndexOffset: sel?1000:0 });
    m.on('click',()=>openPlace(c));
    m.addTo(markerLayer);
  });
}
function drawOrigin(){
  if(!map) return;
  if(originMarker){ map.removeLayer(originMarker); originMarker=null; }
  if(state.origin){
    originMarker = L.circleMarker([state.origin.lat,state.origin.lng],
      { radius:7, color:'#fff', weight:2.5, fillColor:'#3B6CD9', fillOpacity:1 }).addTo(map);
  }
}

/* ===== ACTIONS ===== */
function openPlace(c){
  const same = state.selected && state.selected.id===c.id;
  state.selected = same ? null : c;
  drawMarkers();
  if(state.selected){
    setFrac(Math.max(state.frac, 0.6));
    if(map) map.flyTo([c.lat,c.lng], Math.max(13, map.getZoom()), { duration:0.6 });
  }
  renderPaneListOnly();
  if(state.selected){
    requestAnimationFrame(()=>{
      const el=document.querySelector('.cafe.open');
      if(el) el.scrollIntoView({ block:'nearest', behavior:'smooth' });
    });
  }
}
function setHood(h){ state.hood=h; if(state.selected && state.hood!=='All' && state.selected.neighborhood.split(',')[0]!==h) state.selected=null; drawMarkers(); renderPane(); }
function setQuery(q){ state.query=q; drawMarkers(); renderPaneListOnly(); }

function toggleNear(){
  if(state.geo==='on'){ state.origin=null; state.geo='idle'; drawOrigin(); drawMarkers(); renderChrome(); renderPane(); return; }
  if(!navigator.geolocation){ state.geo='denied'; renderChrome(); return; }
  state.geo='loading'; renderChrome();
  navigator.geolocation.getCurrentPosition(
    (pos)=>{ state.origin={lat:pos.coords.latitude,lng:pos.coords.longitude}; state.geo='on';
      let best=CAFES[0],bd=Infinity;
      CAFES.forEach(c=>{const d=haversine(state.origin.lat,state.origin.lng,c.lat,c.lng); if(d<bd){bd=d;best=c;}});
      drawOrigin(); renderChrome(); openPlace(best);
    },
    ()=>{ state.geo='denied'; renderChrome(); },
    { timeout:8000 }
  );
}

/* ===== RENDER ===== */
function renderChrome(){
  const btn=document.getElementById('locBtn');
  btn.classList.toggle('on', state.geo==='on');
}
function setFrac(f){
  state.frac=f;
  document.getElementById('sheet').style.height=(f*100)+'vh';
  const ch=document.querySelector('.chrome');
  if(ch){ const hide=f>0.7; ch.style.transition='opacity .3s ease'; ch.style.opacity=hide?'0':'1'; ch.style.pointerEvents=hide?'none':''; }
}

function detailHTML(c, d){
  const dir = 'https://www.google.com/maps/dir/?api=1&destination=' + encodeURIComponent(c.address);
  return `<div class="detail">
    <div class="metaRow">${stars(c.rating)}<span class="muted" style="font-size:14px">${c.hours}</span></div>
    <p class="note">${c.note}</p>
    <p class="addr">${c.address}</p>
    <div class="embedWrap">
      <blockquote class="instagram-media" data-instgrm-permalink="${c.instagramUrl}" data-instgrm-version="14"
        style="background:#FFF;border:0;margin:0;padding:0;width:100%;min-width:unset"></blockquote>
    </div>
    <div class="btnRow">
      <a class="btn btn-primary" href="${dir}" target="_blank" rel="noopener noreferrer">${svg(ICON.nav)} Directions</a>
      <a class="btn btn-dark" href="${c.instagramUrl}" target="_blank" rel="noopener noreferrer">${svg(ICON.arrow)} Review</a>
    </div>
  </div>`;
}

function listHTML(){
  const list=results();
  if(list.length===0){ return `<div style="text-align:center;padding:40px 0">
      <div style="font-family:var(--serif);font-size:18px">No cafés here yet</div>
      <div class="muted" style="font-size:14px;margin-top:4px">Try another town or clear your search.</div></div>`; }
  return list.map(c=>{
    const d=distFor(c);
    const open = state.selected && state.selected.id===c.id;
    return `<div class="cafe ${open?'open':''}" data-id="${c.id}">
      <button class="item" data-id="${c.id}">
        <div class="mono">${monogram(c.name)}</div>
        <div class="meta">
          <div style="display:flex;justify-content:space-between;gap:8px">
            <span class="name">${c.name}</span>
            ${d!=null?`<span class="dist">${d.toFixed(1)} mi</span>`:''}
          </div>
          <div class="sub">${c.vibe} · ${c.neighborhood}</div>
        </div>
        ${svg(ICON.chevDown,'chev')}
      </button>
      ${open?detailHTML(c,d):''}
    </div>`;
  }).join('');
}

function renderPane(){
  const pane=document.getElementById('pane');
  pane.innerHTML = `
    <div class="pad">
      <div class="row-top">
        <span class="count">${results().length} ${results().length===1?'café':'cafés'} · North NJ &amp; NYC</span>
        ${state.frac<=PEEK+0.02?'<span class="hint">Swipe up ↑</span>':''}
      </div>
      <div class="search">${svg(ICON.search)}<input id="searchInput" placeholder="Search a café or town" value="${state.query.replace(/"/g,'&quot;')}"/></div>
      <div class="chips" id="chips">
        ${hoods.map(h=>`<button class="chip ${state.hood===h?'on':''}" data-hood="${h}">${h}</button>`).join('')}
      </div>
    </div>
    <div class="list" id="list">${listHTML()}</div>`;
  wireGuide();
  if(state.selected) processEmbeds();
}
// lighter re-render when only the list changes (keeps input focus)
function renderPaneListOnly(){
  const list=document.getElementById('list');
  if(!list){ renderPane(); return; }
  const count=document.querySelector('.count');
  if(count) count.innerHTML = `${results().length} ${results().length===1?'café':'cafés'} · North NJ &amp; NYC`;
  list.innerHTML=listHTML(); wireList();
  if(state.selected) processEmbeds();
}
function wireList(){
  document.querySelectorAll('.item').forEach(el=>{
    el.onclick=()=>{ const id=+el.dataset.id; const c=CAFES.find(x=>x.id===id); openPlace(c); };
  });
}
function wireGuide(){
  const input=document.getElementById('searchInput');
  if(input){ input.oninput=(e)=>setQuery(e.target.value); input.onfocus=()=>{ setFrac(FULL); }; }
  document.querySelectorAll('#chips .chip').forEach(el=>{ el.onclick=()=>setHood(el.dataset.hood); });
  wireList();
}

/* ===== Instagram embeds ===== */
let igLoaded=false;
function processEmbeds(){
  const run=()=>{ if(window.instgrm&&window.instgrm.Embeds){ window.instgrm.Embeds.process(); return true;} return false; };
  if(igLoaded){ run(); return; }
  if(!document.getElementById('ig-embed')){
    const s=document.createElement('script'); s.id='ig-embed'; s.async=true;
    s.src='https://www.instagram.com/embed.js'; s.onload=()=>{ igLoaded=true; run(); };
    document.body.appendChild(s);
  }
  let n=0; const t=setInterval(()=>{ n++; if(run()||n>12){ igLoaded=true; clearInterval(t);} },400);
}

/* ===== SHEET DRAG ===== */
(function(){
  const grab=document.getElementById('grab'), sheet=document.getElementById('sheet');
  let startY=0, startFrac=0, moved=0;
  grab.addEventListener('pointerdown',(e)=>{ startY=e.clientY; startFrac=state.frac; moved=0;
    state.dragging=true; sheet.classList.add('dragging'); try{grab.setPointerCapture(e.pointerId);}catch(_){} });
  grab.addEventListener('pointermove',(e)=>{ if(!state.dragging) return;
    const dy=startY-e.clientY; moved=Math.max(moved,Math.abs(dy));
    const f=Math.min(FULL,Math.max(0.10,startFrac+dy/window.innerHeight)); setFrac(f); });
  const end=()=>{ if(!state.dragging) return; state.dragging=false; sheet.classList.remove('dragging');
    if(moved<6){ setFrac(state.frac>0.45?PEEK:FULL); }
    else { let near=DETENTS[0]; DETENTS.forEach(d=>{ if(Math.abs(d-state.frac)<Math.abs(near-state.frac)) near=d; }); setFrac(near); }
    renderPane();
  };
  grab.addEventListener('pointerup',end); grab.addEventListener('pointercancel',end);
})();

/* ===== BOOT ===== */
document.getElementById('locBtn').onclick=toggleNear;
setFrac(state.frac);
renderPane();
function whenLeaflet(){ if(window.L){ initMap(); } else { setTimeout(whenLeaflet,150); } }
whenLeaflet();
</script>
